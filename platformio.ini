; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_metro_esp32s3]
platform = espressif32
board = adafruit_metro_esp32s3
framework = arduino
;upload_protocol = espota
; Mets ici l'adresse IP affichée sur le Dashboard de ta borne (ex: 192.168.1.50 ou 192.168.4.1)
;upload_port = 192.168.1.45

; --- SÉCURISATION (Optionnel mais recommandé) ---
; Doit correspondre exactement au mot de passe défini dans ton config.json
;upload_flags =
;  --port=8266
;  --auth=TerVoltSecureOta2026!

monitor_speed = 115200
build_flags = -DARDUINO_ARCH_ESP32S3
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps = 
	bblanchon/ArduinoJson@^7.2.2
	knolleary/PubSubClient@^2.8
	esp32async/ESPAsyncWebServer@^3.10.3
	esp32async/AsyncTCP@^3.4.10
	miguelbalboa/MFRC522@^1.4.12
	adafruit/Adafruit NeoPixel@^1.12.3
    https://github.com/CircuitSetup/ATM90E32.git
	paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
